# Cloudflare Worker 部署設定
# 使用 wrangler 部署：npx wrangler deploy
#
# 首次使用：
#   npm install -g wrangler
#   wrangler login
#   wrangler deploy
#
# 設定 API Key（可選但建議）：
#   wrangler secret put PROXY_KEY
#   → 輸入你想要的金鑰

name = "shinsou-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# Free plan: 100,000 requests/day
# 如需更多，升級到 Workers Paid ($5/mo, 10M requests/mo)

[observability]
enabled = true
