name: ShinsouIOS
options:
  bundleIdPrefix: dev.shinsou.ios
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "5UKY38ZLK6"
    CODE_SIGN_STYLE: Automatic

packages:
  ShinsouDomain:
    path: Packages/ShinsouDomain
  ShinsouData:
    path: Packages/ShinsouData
  ShinsouCore:
    path: Packages/ShinsouCore
  ShinsouSourceAPI:
    path: Packages/ShinsouSourceAPI
  ShinsouSourceLocal:
    path: Packages/ShinsouSourceLocal
  ShinsouUI:
    path: Packages/ShinsouUI
  ShinsouI18n:
    path: Packages/ShinsouI18n
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"

targets:
  ShinsouApp:
    type: application
    platform: iOS
    sources:
      - path: ShinsouApp
        excludes:
          - "**/.build/**"
          - "**/.swiftpm/**"
    dependencies:
      - package: ShinsouDomain
      - package: ShinsouData
      - package: ShinsouCore
      - package: ShinsouSourceAPI
      - package: ShinsouSourceLocal
      - package: ShinsouUI
      - package: ShinsouI18n
      - sdk: AuthenticationServices.framework
      - sdk: LocalAuthentication.framework
      - sdk: AVFoundation.framework
      - sdk: MediaPlayer.framework
      - sdk: CryptoKit.framework
      - sdk: CloudKit.framework
      - package: SwiftSoup
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        PRODUCT_BUNDLE_IDENTIFIER: dev.shinsou.ios
        PRODUCT_NAME: Shinsou
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: Shinsou
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Unlock Shinsou with Face ID"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save manga covers to your photo library"
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      testTargets: []
      gatherCoverageData: false

  ShinsouWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShinsouWidgetExtension
    dependencies:
      - package: ShinsouDomain
    entitlements:
      path: ShinsouWidgetExtension/ShinsouWidgetExtension.entitlements
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        PRODUCT_BUNDLE_IDENTIFIER: dev.shinsou.ios.widget
        PRODUCT_NAME: ShinsouWidgetExtension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Shinsou Widget
        SWIFT_EMIT_LOC_STRINGS: YES

schemes:
  ShinsouApp:
    build:
      targets:
        ShinsouApp: all
    run:
      config: Debug
