name: MihonIOS
options:
  bundleIdPrefix: dev.mihon.ios
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "5UKY38ZLK6"
    CODE_SIGN_STYLE: Automatic

packages:
  MihonDomain:
    path: Packages/MihonDomain
  MihonData:
    path: Packages/MihonData
  MihonCore:
    path: Packages/MihonCore
  MihonSourceAPI:
    path: Packages/MihonSourceAPI
  MihonSourceLocal:
    path: Packages/MihonSourceLocal
  MihonUI:
    path: Packages/MihonUI
  MihonI18n:
    path: Packages/MihonI18n
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"

targets:
  MihonApp:
    type: application
    platform: iOS
    sources:
      - path: MihonApp
        excludes:
          - "**/.build/**"
          - "**/.swiftpm/**"
    dependencies:
      - package: MihonDomain
      - package: MihonData
      - package: MihonCore
      - package: MihonSourceAPI
      - package: MihonSourceLocal
      - package: MihonUI
      - package: MihonI18n
      - sdk: AuthenticationServices.framework
      - sdk: LocalAuthentication.framework
      - sdk: AVFoundation.framework
      - sdk: MediaPlayer.framework
      - sdk: CryptoKit.framework
      - package: SwiftSoup
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        PRODUCT_BUNDLE_IDENTIFIER: dev.mihon.ios
        PRODUCT_NAME: Mihon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: Mihon
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Unlock Mihon with Face ID"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save manga covers to your photo library"
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      testTargets: []
      gatherCoverageData: false

  MihonWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MihonWidgetExtension
    dependencies:
      - package: MihonDomain
    entitlements:
      path: MihonWidgetExtension/MihonWidgetExtension.entitlements
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        PRODUCT_BUNDLE_IDENTIFIER: dev.mihon.ios.widget
        PRODUCT_NAME: MihonWidgetExtension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Mihon Widget
        SWIFT_EMIT_LOC_STRINGS: YES

schemes:
  MihonApp:
    build:
      targets:
        MihonApp: all
    run:
      config: Debug
